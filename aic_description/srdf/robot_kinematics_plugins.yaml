kinematic_plugins:
  fwd_kin_plugins:
    manipulator:
      default: KDLFwdKinChain
      plugins:
        KDLFwdKinChain:
          class: KDLFwdKinChainFactory
          default: true
          config:
            base_link: base_link
            tip_link: gripper/tcp
  inv_kin_plugins:
    manipulator:
      default: KDLInvKinChainLMA
      plugins:
        KDLInvKinChainLMA:
          class: KDLInvKinChainLMAFactory
          default: true
          config:
            base_link: base_link
            tip_link: gripper/tcp
        KDLInvKinChainNR:
          class: KDLInvKinChainNRFactory
          config:
            base_link: base_link
            tip_link: gripper/tcp

collision_checking:
  bool_contact_limit: 1
  report_contact_limit: 100

contact_manager_plugins:
  search_paths:
    - __TESSERACT_PYTHON_LIBS__
  search_libraries:
    - tesseract_collision_bullet_factories
    - tesseract_collision_fcl_factories
  discrete_plugins:
    default: FCLDiscreteBVHManager
    plugins:
      FCLDiscreteBVHManager:
        class: FCLDiscreteBVHManagerFactory
  continuous_plugins:
    default: BulletCastBVHManager
    plugins:
      BulletCastBVHManager:
        class: BulletCastBVHManagerFactory
